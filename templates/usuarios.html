{% extends "base.html" %}{% block content %}<h3>Cadastro de Usuários</h3><div class="card mb-3"><div class="card-body"><form method="post" class="row g-2"><div class="col-md-3"><label>Nome</label><input class="form-control" name="nome" required></div><div class="col-md-2"><label>Login</label><input class="form-control" name="login" required></div><div class="col-md-2"><label>Senha</label><input class="form-control" type="password" name="senha" required></div><div class="col-md-3"><label>Perfil</label><select class="form-select" name="perfil"><option>ADMIN</option><option>GARCOM</option><option>COZINHA</option><option>CAIXA</option></select></div><div class="col-md-2 d-flex align-items-end"><button class="btn btn-primary w-100">Salvar</button></div></form></div></div><table class="table table-striped"><thead><tr><th>Nome</th><th>Login</th><th>Perfil</th></tr></thead><tbody>{% for u in usuarios %}<tr><td>{{ u.nome }}</td><td>{{ u.login }}</td><td>{{ u.perfil }}</td></tr>{% endfor %}</tbody></table>{% endblock %}
