{% extends "base.html" %}{% block content %}<h3>Editar Produto</h3><div class="card"><div class="card-body"><form method="post" class="row g-3"><div class="col-md-4"><label>Descrição</label><input class="form-control" name="descricao" value="{{ produto.descricao }}" required></div><div class="col-md-2"><label>Categoria</label><select class="form-select" name="categoria">{% for cat in ["Espeto","Bebida","Acompanhamento","Sobremesa","Outro"] %}<option {% if produto.categoria==cat %}selected{% endif %}>{{ cat }}</option>{% endfor %}</select></div><div class="col-md-2"><label>Valor</label><input class="form-control" name="valor" value="{{ "%.2f"|format(produto.valor) }}" required></div><div class="col-md-2"><label>Setor</label><select class="form-select" name="setor_preparo"><option value="CHURRASQUEIRA" {% if produto.setor_preparo=="CHURRASQUEIRA" %}selected{% endif %}>Churrasqueira</option><option value="COZINHA" {% if produto.setor_preparo=="COZINHA" %}selected{% endif %}>Cozinha</option><option value="BAR" {% if produto.setor_preparo=="BAR" %}selected{% endif %}>Bar/Bebidas</option></select></div><div class="col-md-2"><label>Tipo</label><select class="form-select" name="tipo_produto"><option value="SIMPLES" {% if produto.tipo_produto=="SIMPLES" %}selected{% endif %}>Simples</option><option value="COMBO" {% if produto.tipo_produto=="COMBO" %}selected{% endif %}>Combo</option></select></div><div class="col-md-2 d-flex align-items-end"><div class="form-check"><input class="form-check-input" type="checkbox" name="usa_ponto_carne" {% if produto.usa_ponto_carne %}checked{% endif %}><label class="form-check-label">Usa ponto</label></div></div><div class="col-md-2 d-flex align-items-end"><div class="form-check"><input class="form-check-input" type="checkbox" name="ativo" {% if produto.ativo %}checked{% endif %}><label class="form-check-label">Ativo</label></div></div><div class="col-12"><button class="btn btn-success">Salvar</button> <a class="btn btn-secondary" href="{{ url_for('produtos', inativos=1) }}">Voltar</a></div></form></div></div>{% endblock %}
