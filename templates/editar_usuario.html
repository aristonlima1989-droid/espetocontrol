{% extends "base.html" %}
{% block content %}
<h3>Editar Usuário</h3>
<div class="card"><div class="card-body">
<form method="post" class="row g-3">
<div class="col-md-4"><label>Nome</label><input class="form-control" name="nome" value="{{ usuario.nome }}" required></div>
<div class="col-md-3"><label>Login</label><input class="form-control" name="login" value="{{ usuario.login }}" required></div>
<div class="col-md-3"><label>Perfil</label><select class="form-select" name="perfil" {% if usuario.login == "admin" %}disabled{% endif %}>{% for perfil in ["ADMIN","GARCOM","COZINHA","CAIXA"] %}<option value="{{ perfil }}" {% if usuario.perfil == perfil %}selected{% endif %}>{{ perfil }}</option>{% endfor %}</select>{% if usuario.login == "admin" %}<input type="hidden" name="perfil" value="ADMIN">{% endif %}</div>
<div class="col-md-2 d-flex align-items-end"><div class="form-check"><input class="form-check-input" type="checkbox" name="ativo" {% if usuario.ativo %}checked{% endif %} {% if usuario.login == "admin" %}disabled{% endif %}><label class="form-check-label">Ativo</label>{% if usuario.login == "admin" %}<input type="hidden" name="ativo" value="on">{% endif %}</div></div>
<div class="col-12"><button class="btn btn-success">Salvar</button> <a class="btn btn-secondary" href="{{ url_for('usuarios') }}">Voltar</a></div>
</form></div></div>
{% endblock %}
