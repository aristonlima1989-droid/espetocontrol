{% extends "base.html" %}{% block content %}<h3>Caixa - Comandas Abertas</h3><table class="table table-hover"><thead><tr><th>Comanda</th><th>Mesa</th><th>Cliente</th><th>Abertura</th><th>Total</th><th>Ação</th></tr></thead><tbody>{% for c in comandas %}<tr><td><b>{{ c.numero }}</b></td><td>{{ c.mesa }}</td><td>{{ c.cliente }}</td><td>{{ c.data_abertura }}</td><td><b>R$ {{ "%.2f"|format(c.total) }}</b></td><td><a class="btn btn-sm btn-dark" href="{{ url_for('comanda_historico', comanda_id=c.id) }}">Histórico</a> <a class="btn btn-sm btn-success" href="{{ url_for('fechar_comanda', comanda_id=c.id) }}">Fechar</a></td></tr>{% endfor %}</tbody></table>{% endblock %}
